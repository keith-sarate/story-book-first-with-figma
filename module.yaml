name: storybook-first-with-figma
version: 0.3.0
description: |
  Storybook-First with Figma — installs as a BMad customization (default) or a
  standalone Claude Code skill (--mode skill). Drops the workflow manual, the
  agent customization, Figma MCP wiring, and visual validation script into a
  target project.

author: Keith Sarate <keith.sarate@objectedge.com>
license: MIT
type: bmad-customization-or-claude-skill

modes:
  bmad:
    description: BMad-compatible — injects workflow as bmad-dev-story persistent_facts. Default.
    trigger: /bmad-dev-story <story-file>
    requires:
      bmad_core: ">=0.1"
      bmad_modules:
        - bmm   # for bmad-dev-story
  skill:
    description: Standalone Claude Code skill — invoked with a Figma URL, no BMad needed.
    trigger: /storybook-figma <figma-url>
    requires:
      claude_code: ">=any"

requires:
  runtime:
    node: ">=20"
    pnpm: ">=9"
  external:
    - claude-code      # MCP client
    - figma-account    # personal access token required

installs:
  shared:
    files:
      - target: docs/workflows/storybook-first-with-figma.md
        source: templates/docs/workflows/storybook-first-with-figma.md
      - target: docs/workflows/storybook-first-with-figma.svg
        source: templates/docs/workflows/storybook-first-with-figma.svg
      - target: scripts/visual-check.mjs
        source: templates/scripts/visual-check.mjs
        mode: "0755"
      - target: .mcp.json
        source: templates/dotfiles/mcp.json
        requires_approval: true   # writing .mcp.json may need explicit user OK
      - target: .env.example
        source: templates/dotfiles/env.example
    appends:
      - target: .gitignore
        source: templates/dotfiles/gitignore.append
  bmad_only:
    files:
      - target: _bmad/custom/bmad-dev-story.toml
        source: templates/_bmad/custom/bmad-dev-story.toml
  skill_only:
    files:
      - target: .claude/skills/storybook-figma/SKILL.md
        source: templates/skill/storybook-figma/SKILL.md

variables:
  FIGMA_FILE_KEY:
    description: The file key from your Figma URL (the part after /design/)
    required: true

postinstall:
  - "Open .env and paste a Figma personal access token in FIGMA_TOKEN (the installer creates .env from .env.example with the file key already filled)"
  - "BMad mode: author UI stories with a Figma link in References; the dev agent runs preflight + Step 0 on each one — it will guide you through /mcp approval and any other missing setup on first run"
  - "Skill mode: paste a Figma node URL and invoke /storybook-figma <figma-url> — the skill runs preflight + Step 0 + bottom-up build in one conversation; no story file needed"
