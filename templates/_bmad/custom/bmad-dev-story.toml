# Project override for bmad-dev-story.
# Injects the Storybook-First with Figma workflow as a persistent fact so EVERY
# dev run in this project follows that loop (read Figma → build → sync back).
# Merge rule: arrays append, so the base persistent_facts entry is preserved.

[workflow]

persistent_facts = [
  "Scope guard — evaluate FIRST, before anything else in this list. This workflow applies ONLY to UI stories. Classify the incoming story as UI if ANY of these hold: (a) References contains a Figma link; (b) Acceptance Criteria or Tasks mention a component, screen, variant, or visual outcome; (c) the work touches files under src/components/, src/app/, src/pages/, src/tokens/, tailwind.config.*, or any Storybook/CSS file. Classify as NON-UI otherwise — backend, API, schema, infra, scripts, docs, build/CI, config, or tests unrelated to visual rendering. For NON-UI stories: skip Step 0 and the entire 5-step loop, ignore every rule below about Figma, Atomic Design, tokens, Storybook, visual-check, and Figma sync-back, and execute the standard BMad dev flow as if this customization were not present. In the FIRST response of the run, state the classification verbatim — 'Classified as UI story — Storybook-First workflow active' or 'Classified as NON-UI story — Storybook-First workflow skipped, running standard BMad dev flow' — so the user can correct it before implementation begins. If the classification is ambiguous (mixed scope, unclear References), HALT and ask the user before proceeding.",
  "file:{project-root}/docs/workflows/storybook-first-with-figma.md",
  "All UI work in this project follows Atomic Design: atoms → molecules → organisms → screen. Lower layers MUST be built before higher layers; higher layers MUST reuse the existing components, not duplicate them.",
  "Design tokens (color, spacing, radius, typography) live in tailwind.config.ts and are the single source of truth. Components consume tokens via Tailwind utilities; hardcoded hex/px values are a defect.",
  "Every component MUST ship with a Storybook story file (.stories.tsx) covering Default plus one story per Figma-documented variant or state.",
  "After Storybook renders a component, the dev MUST invoke /prototype-to-figma (or equivalent Figma MCP skill) to push the built result back to a 'Built / <Layer>' page in the Figma file and visually diff it against the source frame.",
  "Visual Validation Loop is MANDATORY before any component is marked done: run `pnpm visual:check --story <id> --figma-node <node-id> --out <component>/<variant>`, then read both _visual-checks/<out>/actual.png and expected.png and walk the Visual Checklist in docs/workflows/storybook-first-with-figma.md. Any drift triggers a fix loop. Manual eyeballing alone is not acceptance — the screenshot comparison is.",
  "When actual.png and expected.png disagree, design tokens and Figma values are the source of truth. Never measure pixels off either PNG by eye — resolve via Figma MCP `get_variable_defs` / `get_code` and the project's tokens.ts.",
  "Preflight check — run as the FIRST action of every UI story, BEFORE Step 0. Verify in order, and HALT with the exact remediation message on the first failure: (1) Figma MCP tools available (try a trivial `mcp__figma__get_code` probe against the story's node-id); on failure HALT with 'Figma MCP not connected — open Claude Code → /mcp → approve `figma`, then re-run this story.' (2) `.env` exists at project root with non-empty `FIGMA_TOKEN`; on failure HALT with 'FIGMA_TOKEN missing — open `.env` (or `cp .env.example .env` if it does not exist) and paste a personal access token from https://www.figma.com/settings → Personal access tokens, then re-run this story.' (3) `scripts/visual-check.mjs` exists; on failure HALT with 'visual-check.mjs missing — re-run the module installer (install.sh).' (4) Playwright runtime present (`node_modules/playwright` exists OR `<pm> exec playwright --version` exits 0); on failure HALT with 'Playwright not installed — run `pnpm i -D playwright @playwright/test dotenv && pnpm exec playwright install chromium` (or your project's package manager equivalent).' (5) `package.json` has `scripts.visual:check` set to `node scripts/visual-check.mjs`; on failure HALT with 'Missing npm script — add `\"visual:check\": \"node scripts/visual-check.mjs\"` to package.json scripts.' (6) Storybook present in project — check for `.storybook/main.*` (any extension: js/ts/cjs/mjs) OR any `@storybook/*` entry in `package.json` `devDependencies`/`dependencies`; on failure HALT with 'Storybook not set up in this project — run `pnpm dlx storybook@latest init` (or your framework's equivalent CLI), commit the generated `.storybook/` folder and stories example, then re-run this story.' Each HALT message IS the remediation — never invent a fallback that bypasses any check, and never silently downgrade to manual eyeballing.",
  "Storybook dev server lifecycle — BEFORE the first `pnpm visual:check` call in any per-component loop, verify the Storybook dev server is reachable at http://localhost:6006/iframe.html (probe via `curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:6006/iframe.html` or equivalent fetch). If not reachable (connection refused, timeout, or non-2xx): start it in the BACKGROUND using the Bash tool with `run_in_background: true` and the project's storybook script (commonly `pnpm storybook` — fall back to `npm run storybook` / `yarn storybook` / `bun storybook` based on the lockfile detected during preflight). Then poll `http://localhost:6006/iframe.html` every 2 seconds with a 60-second cap until HTTP 200; if the cap is hit, HALT with the captured Storybook startup logs and ask the user to investigate (common causes: port 6006 in use, framework-specific build error, missing `.storybook/main.*`). Do NOT kill the server at the end of the story — leave it running so subsequent stories reuse the same instance.",
  "Before starting the 5-step loop, refine the incoming story via Step 0 (see docs/workflows/storybook-first-with-figma.md#step-0): (1) resolve the Figma reference link; (2) classify the target as atom/molecule/organism/screen; (3) decompose recursively to identify every lower-layer dependency; (4) run a Reuse Check on every node of the dependency tree — REUSE if exists in the right layer, EXTEND if variant missing, UPDATE/HALT if conflicts with Figma, OFF-LAYER/HALT if exists but outside the atomic folder structure (brownfield), CREATE if missing; (5) produce a bottom-up build plan that schedules one 5-step loop execution per CREATE/EXTEND in dependency order (atoms first, then molecules, then organisms, then the target); (6) strengthen Acceptance Criteria to reference the Visual Validation Loop, the no-hardcoded-tokens rule, and the layer-correctness rule; (7) surface the plan to the user if more than three components will be created; (8) HALT only on explicit scope errors like \"build all molecules\" (a discovery-shaped story, not a target story); (9) persist the edits to the story file before starting implementation.",
  "Recursive build mandate: when a brownfield project adopts this module, the first stories will frequently target organisms or screens before any atoms exist in the atomic folders. The dev agent MUST handle this by executing the build plan from Step 0 bottom-up in a SINGLE dev-story run — never by building lower-layer primitives inline inside the higher-layer file. Every atom belongs in src/components/atoms/<Name>/, every molecule in src/components/molecules/<Name>/, etc., regardless of whether it was discovered as a dependency of a larger target or as a story's explicit target.",
  "Figma file structure expected: published Variables for design tokens, atomic-design frames (Atoms/Molecules/Organisms/Screen), and Components with complete variant sets. If any of these are missing at runtime, surface the gap to the user — do not silently invent structure or token names.",
]
