# Sprint status for the Storybook + Atomic Design + Figma demo.
# Read by bmad-dev-story to auto-discover the next ready story.
# Update the status column to: ready-for-dev | in-progress | done | blocked
#
# NOTE: per-atom stories (1-2-1-*, 1-2-2-*, ...) and 1-2-99-atoms-sync are
# generated by Story 1.2.0 (atoms-discovery) once Figma MCP is live.

sprint_name: storybook-first-with-figma-demo
epic: 1
description: |
  Build a Storybook-first Atomic Design demo from a Figma source file using the
  Storybook-First with Figma workflow. Each story builds one layer; the next layer
  reuses what the previous one produced. Atoms are built one at a time so the
  demo can show each one landing in Storybook live.

development_status:
  epic-1: in-progress

  1-1-bootstrap-and-tokens:
    status: ready-for-dev
    title: Project Bootstrap, Figma MCP & Design Tokens
    file: 1-1-bootstrap-and-tokens.md
    blocks: [1-2-0-atoms-discovery]

  1-2-0-atoms-discovery:
    status: ready-for-dev
    title: Atoms Discovery — read Figma and scaffold one story per atom
    file: 1-2-0-atoms-discovery.md
    depends_on: [1-1-bootstrap-and-tokens]
    blocks: [1-3-molecules]
    # This story appends entries below for each atom found, plus 1-2-99-atoms-sync,
    # and rewires 1-3-molecules.depends_on to [1-2-99-atoms-sync].

  # ─── Generated by 1-2-0-atoms-discovery ─────────────────────────────────
  # 1-2-1-<atom-kebab>:
  #   status: ready-for-dev
  #   title: "Atom — <AtomName>"
  #   file: 1-2-1-<atom-kebab>.md
  #   depends_on: [1-1-bootstrap-and-tokens]
  # ...
  # 1-2-99-atoms-sync:
  #   status: ready-for-dev
  #   title: Atoms — bulk sync to Figma
  #   file: 1-2-99-atoms-sync.md
  #   depends_on: [<every per-atom key>]
  # ────────────────────────────────────────────────────────────────────────

  1-3-molecules:
    status: ready-for-dev
    title: Molecules composing atoms
    file: 1-3-molecules.md
    depends_on: [1-2-0-atoms-discovery]    # discovery rewires this to 1-2-99-atoms-sync
    blocks: [1-4-organisms, 1-5-screen]

  1-4-organisms:
    status: ready-for-dev
    title: Organisms composing molecules and atoms
    file: 1-4-organisms.md
    depends_on: [1-3-molecules]
    blocks: [1-5-screen]

  1-5-screen:
    status: ready-for-dev
    title: Full screen assembled from organisms
    file: 1-5-screen.md
    depends_on: [1-4-organisms]
